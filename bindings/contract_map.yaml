# Contract map: every llmcore symbol the bridge relies on, with the shape the
# bridge assumes. Consumed by bindings/scripts/contract_guard.py (AST-only; no
# import, so it runs without confy/heavy deps). If llmcore drifts, the guard
# fails in CI before a release can ship a stale contract.
#
# kind:
#   function    - module-level def (params_include / returns_contains)
#   method      - def inside `class` (params_include / returns_contains)
#   class       - class def (fields_include = annotated class attributes)
#   enum_class  - class def (members_include = class-level names)
#
# params_include / fields_include / members_include are *subsets* (additive
# evolution is allowed). returns_contains is a substring of the unparsed return
# annotation (omitted where the base annotation is intentionally `Any`).

symbols:
  # ---- Tier-0 facade (api.py) ----
  - id: LLMCore.chat
    file: src/llmcore/api.py
    kind: method
    class: LLMCore
    name: chat
    params_include: [message, stream, tools, tool_choice, session_id]
    returns_contains: "AsyncGenerator"
