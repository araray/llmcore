// llmcore.v1 — multimodal & live audio (Tier 2).
//
// DESIGNED in B0/B1 (contract is complete and compiles); IMPLEMENTED in phase B3.
// In B1 the bridge registers these RPCs but returns UNIMPLEMENTED until the
// `tier2.*` capabilities are enabled. Every message mirrors a verified type in
// llmcore.models_multimodal / providers.deepgram_provider (see contract_map.yaml).
syntax = "proto3";

package llmcore.v1;

import "google/protobuf/struct.proto";

// ---- One-shot results -------------------------------------------------------

// SpeechResult — models_multimodal.py:21.
message SpeechResult {
  bytes audio_data = 1;
  string format = 2;
  string model = 3;
  string voice = 4;
  optional double duration_seconds = 5;
  google.protobuf.Struct metadata = 6;
}

// TranscriptionSegment — models_multimodal.py:57.
message TranscriptionSegment {
  string text = 1;
  double start = 2;
  double end = 3;
  optional string speaker = 4;
}

// TranscriptionResult — models_multimodal.py:76.
message TranscriptionResult {
  string text = 1;
  optional string language = 2;
  optional double duration_seconds = 3;
  repeated TranscriptionSegment segments = 4;
  string model = 5;
  google.protobuf.Struct metadata = 6;
}

// GeneratedImage / ImageGenerationResult — models_multimodal.py:113 / :141.
message GeneratedImage {
  optional string data = 1;              // base64 (b64_json) when present
  optional string url = 2;
  optional string revised_prompt = 3;
  string format = 4;
}

message ImageGenerationResult {
  repeated GeneratedImage images = 1;
  string model = 2;
  google.protobuf.Struct metadata = 3;
}

// OCRResult — models_multimodal.py:165.
message OCRResult {
  repeated google.protobuf.Struct pages = 1;
  string model = 2;
  google.protobuf.Value document_annotation = 3;
  int32 pages_processed = 4;
  optional int64 doc_size_bytes = 5;
  google.protobuf.Struct metadata = 6;
}

// TextAnalysisResult — models_multimodal.py:404.
message TextAnalysisResult {
  optional string summary = 1;
  repeated google.protobuf.Struct topics = 2;
  repeated google.protobuf.Struct intents = 3;
  google.protobuf.Struct sentiments = 4;
  optional string language = 5;
  optional string model = 6;
  optional string request_id = 7;
  google.protobuf.Struct metadata = 8;
  google.protobuf.Struct raw = 9;
}

// ---- Streaming events -------------------------------------------------------

// StreamEventType — models_multimodal.py:221 (classic STT + Flux + lifecycle).
enum StreamEventType {
  STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  STREAM_EVENT_TYPE_INTERIM = 1;
  STREAM_EVENT_TYPE_FINAL = 2;
  STREAM_EVENT_TYPE_UTTERANCE_END = 3;
  STREAM_EVENT_TYPE_SPEECH_STARTED = 4;
  STREAM_EVENT_TYPE_METADATA = 5;
  STREAM_EVENT_TYPE_START_OF_TURN = 6;
  STREAM_EVENT_TYPE_EAGER_END_OF_TURN = 7;
  STREAM_EVENT_TYPE_TURN_RESUMED = 8;
  STREAM_EVENT_TYPE_END_OF_TURN = 9;
  STREAM_EVENT_TYPE_UPDATE = 10;
  STREAM_EVENT_TYPE_OPEN = 11;
  STREAM_EVENT_TYPE_CLOSE = 12;
  STREAM_EVENT_TYPE_ERROR = 13;
  STREAM_EVENT_TYPE_OTHER = 14;
}

// TranscriptionStreamEvent — models_multimodal.py:261.
message TranscriptionStreamEvent {
  StreamEventType type = 1;
  string text = 2;
  optional bool is_final = 3;
  optional bool speech_final = 4;
  optional double start = 5;
  optional double end = 6;
  optional double confidence = 7;
  repeated google.protobuf.Struct words = 8;
  optional string speaker = 9;
  repeated int32 channel_index = 10;
  string provider = 11;
  google.protobuf.Struct raw = 12;
}

// VoiceAgentEventType — models_multimodal.py:311.
enum VoiceAgentEventType {
  VOICE_AGENT_EVENT_TYPE_UNSPECIFIED = 0;
  VOICE_AGENT_EVENT_TYPE_WELCOME = 1;
  VOICE_AGENT_EVENT_TYPE_SETTINGS_APPLIED = 2;
  VOICE_AGENT_EVENT_TYPE_CONVERSATION_TEXT = 3;
  VOICE_AGENT_EVENT_TYPE_USER_STARTED_SPEAKING = 4;
  VOICE_AGENT_EVENT_TYPE_AGENT_THINKING = 5;
  VOICE_AGENT_EVENT_TYPE_AGENT_STARTED_SPEAKING = 6;
  VOICE_AGENT_EVENT_TYPE_AGENT_AUDIO_DONE = 7;
  VOICE_AGENT_EVENT_TYPE_AUDIO = 8;
  VOICE_AGENT_EVENT_TYPE_FUNCTION_CALL_REQUEST = 9;
  VOICE_AGENT_EVENT_TYPE_PROMPT_UPDATED = 10;
  VOICE_AGENT_EVENT_TYPE_THINK_UPDATED = 11;
  VOICE_AGENT_EVENT_TYPE_SPEAK_UPDATED = 12;
  VOICE_AGENT_EVENT_TYPE_INJECTION_REFUSED = 13;
  VOICE_AGENT_EVENT_TYPE_ERROR = 14;
  VOICE_AGENT_EVENT_TYPE_WARNING = 15;
  VOICE_AGENT_EVENT_TYPE_OPEN = 16;
  VOICE_AGENT_EVENT_TYPE_CLOSE = 17;
  VOICE_AGENT_EVENT_TYPE_OTHER = 18;
}

// VoiceAgentFunctionCall — models_multimodal.py:345.
message VoiceAgentFunctionCall {
  string id = 1;
  string name = 2;
  google.protobuf.Struct arguments = 3;
  bool client_side = 4;
  google.protobuf.Struct raw = 5;
}

// VoiceAgentEvent — models_multimodal.py:370.
message VoiceAgentEvent {
  VoiceAgentEventType type = 1;
  optional string role = 2;
  optional string content = 3;
  optional bytes audio = 4;
  VoiceAgentFunctionCall function_call = 5;
  string provider = 6;
  google.protobuf.Struct raw = 7;
}

// ---- Duplex client->server frames ------------------------------------------

enum SttControl {
  STT_CONTROL_UNSPECIFIED = 0;
  STT_CONTROL_FINALIZE = 1;
  STT_CONTROL_KEEPALIVE = 2;
  STT_CONTROL_CLOSE = 3;
}

message OpenStt {
  optional string model = 1;
  optional string language = 2;
  google.protobuf.Struct options = 3;
}

// Mirrors DeepgramTranscriptionStream (deepgram_provider.py:2307).
message AudioIn {
  oneof frame {
    OpenStt open = 1;
    bytes audio = 2;
    SttControl control = 3;
  }
}

enum TtsControl {
  TTS_CONTROL_UNSPECIFIED = 0;
  TTS_CONTROL_FLUSH = 1;
  TTS_CONTROL_CLEAR = 2;
  TTS_CONTROL_CLOSE = 3;
}

message OpenTts {
  optional string voice = 1;
  optional string model = 2;
  optional string format = 3;
}

// Mirrors DeepgramSpeechStream (deepgram_provider.py:2396).
message SynthControl {
  oneof frame {
    OpenTts open = 1;
    string text = 2;
    TtsControl control = 3;
  }
}

message AudioOut {
  bytes audio = 1;
  int64 seq = 2;
}

message FunctionCallResponse {
  string id = 1;
  string output = 2;
}

// Mirrors DeepgramVoiceAgentSession (deepgram_provider.py:2561).
message VoiceAgentClientEvent {
  oneof event {
    google.protobuf.Struct settings = 1;
    bytes audio = 2;
    string inject_user_message = 3;
    string inject_agent_message = 4;
    string update_prompt = 5;
    google.protobuf.Struct update_think = 6;
    google.protobuf.Struct update_speak = 7;
    FunctionCallResponse respond_to_function_call = 8;
    bool keepalive = 9;
  }
}

// ---- One-shot request/response wrappers ------------------------------------

message SynthesizeRequest {
  string text = 1;
  optional string voice = 2;
  optional string model = 3;
  optional string response_format = 4;
  optional double speed = 5;
  optional string provider_name = 6;
}

message TranscribeRequest {
  bytes audio_data = 1;
  optional string model = 2;
  optional string language = 3;
  optional string response_format = 4;
  optional string provider_name = 5;
}

message GenerateImageRequest {
  string prompt = 1;
  optional string model = 2;
  int32 n = 3;
  optional string size = 4;
  optional string quality = 5;
  optional string provider_name = 6;
}

message OcrRequest {
  oneof source {
    string url = 1;
    bytes data = 2;
  }
  optional string model = 3;
  optional string provider_name = 4;
}

message AnalyzeTextRequest {
  string text = 1;
  optional string model = 2;
  google.protobuf.Struct features = 3;
  optional string provider_name = 4;
}

service AudioService {
  // One-shot (unary)
  rpc Synthesize (SynthesizeRequest) returns (SpeechResult);            // generate_speech (base.py:253)
  rpc Transcribe (TranscribeRequest) returns (TranscriptionResult);     // transcribe_audio (base.py:285)
  rpc GenerateImage (GenerateImageRequest) returns (ImageGenerationResult); // generate_image (base.py:319)
  rpc Ocr (OcrRequest) returns (OCRResult);                             // ocr (base.py:354)
  rpc AnalyzeText (AnalyzeTextRequest) returns (TextAnalysisResult);    // analyze_text (deepgram_provider.py:2010)

  // Live streaming (B3)
  rpc TranscribeStream (stream AudioIn) returns (stream TranscriptionStreamEvent); // deepgram_provider.py:1275
  rpc SynthesizeStream (stream SynthControl) returns (stream AudioOut);            // deepgram_provider.py:1535
  rpc VoiceAgent (stream VoiceAgentClientEvent) returns (stream VoiceAgentEvent);  // deepgram_provider.py:1875
}
