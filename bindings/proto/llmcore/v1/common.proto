// llmcore.v1 — common domain messages shared across services.
//
// Field numbers are STABLE for the v1 contract. Every message/field traces to a
// verified llmcore source symbol (see bindings/contract_map.yaml + spec App. E).
syntax = "proto3";

package llmcore.v1;

import "google/protobuf/struct.proto";

// Empty placeholder for RPCs that take/return no payload.
message Empty {}

// Conversation role — mirrors llmcore.models.Role (models.py:29).
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SYSTEM = 1;
  ROLE_USER = 2;
  ROLE_ASSISTANT = 3;
  ROLE_TOOL = 4;
}

// A single conversation message — mirrors llmcore.models.Message (models.py:56).
message Message {
  string id = 1;
  string session_id = 2;
  Role role = 3;
  string content = 4;
  string timestamp = 5;                      // RFC-3339 / ISO-8601 UTC
  string tool_call_id = 6;
  int32 tokens = 7;
  google.protobuf.Struct metadata = 8;
}

// Provider-agnostic tool/function definition — llmcore.models.Tool (models.py:784).
message Tool {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;     // JSON Schema object
}

// A tool invocation requested by the model — llmcore.models.ToolCall (models.py:801).
message ToolCall {
  string id = 1;
  string name = 2;
  google.protobuf.Struct arguments = 3;
}

// The result of executing a tool — llmcore.models.ToolResult (models.py:818).
message ToolResult {
  string tool_call_id = 1;
  string content = 2;
  bool is_error = 3;
}

// Per-call token usage — mirrors llmcore.usage.ChatUsage (usage.py:69).
message Usage {
  optional int32 prompt_tokens = 1;
  optional int32 completion_tokens = 2;
  optional int32 total_tokens = 3;
  optional string provider = 4;
  optional string model = 5;
}

// A single embedding vector (OpenAI-style data[] element).
message FloatVector {
  repeated float values = 1;
  int32 index = 2;
}
