// llmcore.v1 — provider/model catalog (Tier 0).
syntax = "proto3";

package llmcore.v1;

import "google/protobuf/struct.proto";
import "llmcore/v1/common.proto";

// ModelDetails — mirrors llmcore.models.ModelDetails (models.py:498).
message ModelDetails {
  string id = 1;
  string provider_name = 2;
  optional string display_name = 3;
  int32 context_length = 4;
  optional int32 max_output_tokens = 5;
  bool supports_streaming = 6;
  bool supports_tools = 7;
  bool supports_vision = 8;
  bool supports_reasoning = 9;
  optional string family = 10;
  optional string parameter_count = 11;
  optional string quantization_level = 12;
  optional int64 file_size_bytes = 13;
  optional string model_type = 14;
  google.protobuf.Struct metadata = 15;
}

message ListProvidersResponse {
  repeated string providers = 1;
}

message ListModelsRequest {
  string provider_name = 1;
}

message ListModelsResponse {
  repeated string models = 1;
}

message GetProviderRequest {
  optional string provider_name = 1;
}

service CatalogService {
  rpc ListProviders (Empty) returns (ListProvidersResponse);          // LLMCore.get_available_providers (api.py:598)
  rpc ListModels (ListModelsRequest) returns (ListModelsResponse);    // LLMCore.get_models_for_provider (api.py:3078)
  rpc GetProviderDetails (GetProviderRequest) returns (ModelDetails); // LLMCore.get_provider_details (api.py:906)
}
